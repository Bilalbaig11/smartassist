<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartAssist — Workout History</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090e;--surface:#0c1018;--card:#111520;--card2:#161c29;
  --border:#1c2535;--border2:#253045;
  --accent:#00e5a0;--accent-d:#00b87d;
  --blue:#3ba7ff;--orange:#ff8c42;--red:#ff4646;--purple:#9d6cff;
  --text:#dde4f0;--muted:#4a5a72;--muted2:#2e3d52;
  --squat:#3ba7ff;--plank:#9d6cff;
  --ff-display:'Bebas Neue',sans-serif;
  --ff-mono:'DM Mono',monospace;
  --ff-body:'DM Sans',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--ff-body)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.35}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2)}

/* Nav */
nav{height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;border-bottom:1px solid var(--border);
  background:rgba(7,9,14,.9);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:var(--ff-display);font-size:1.7rem;color:var(--accent);letter-spacing:.04em}
.nav-links{display:flex;gap:6px}
.nav-link{padding:6px 14px;border-radius:6px;font-size:.8rem;font-weight:500;
  text-decoration:none;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
.nav-link:hover{color:var(--text);background:var(--card2)}
.nav-link.active{color:var(--accent);background:rgba(0,229,160,.08)}

/* Page header */
.page-head{
  max-width:1100px;margin:0 auto;padding:40px 2rem 24px;
  display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;
}
.ph-left h1{font-family:var(--ff-display);font-size:3rem;letter-spacing:.04em}
.ph-left p{font-size:.85rem;color:var(--muted);margin-top:4px}
.ph-right{display:flex;gap:8px;align-items:center}

.filter-tabs{display:flex;gap:4px;background:var(--surface);padding:3px;
  border-radius:8px;border:1px solid var(--border)}
.ft{padding:6px 14px;border-radius:5px;font-family:var(--ff-mono);font-size:.68rem;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;
  border:none;background:transparent;transition:all .2s}
.ft:hover{color:var(--text)}
.ft.on{background:var(--card2);color:var(--text);border:1px solid var(--border2)}

.new-btn{padding:8px 16px;border-radius:7px;background:var(--accent);color:#000;
  font-family:var(--ff-display);font-size:.9rem;letter-spacing:.06em;
  text-decoration:none;transition:all .2s;border:none;cursor:pointer}
.new-btn:hover{background:var(--accent-d)}

/* Summary bar */
.summary-bar{
  max-width:1100px;margin:0 auto 24px;padding:0 2rem;
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
}
.sb-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 18px;display:flex;flex-direction:column;gap:4px;
}
.sb-v{font-family:var(--ff-display);font-size:2.2rem;color:var(--text);line-height:1}
.sb-l{font-family:var(--ff-mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* Sessions list */
.sessions-wrap{max-width:1100px;margin:0 auto;padding:0 2rem 60px}

.empty-state{
  text-align:center;padding:80px 0;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.empty-icon{font-size:3rem;opacity:.3}
.empty-state h3{font-family:var(--ff-display);font-size:1.8rem;color:var(--muted);letter-spacing:.04em}
.empty-state p{font-size:.85rem;color:var(--muted2)}

.session-row{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;margin-bottom:8px;cursor:pointer;
  transition:all .2s;display:grid;
  grid-template-columns:auto 1fr auto auto auto auto;
  align-items:center;gap:16px;
}
.session-row:hover{border-color:var(--border2);background:var(--card2);transform:translateX(2px)}
.session-row.active-row{border-color:var(--accent);background:rgba(0,229,160,.04)}

.row-ex{font-family:var(--ff-display);font-size:1.1rem;letter-spacing:.06em;
  width:72px;flex-shrink:0}
.row-ex.squat{color:var(--squat)}
.row-ex.plank{color:var(--plank)}

.row-meta{min-width:0}
.row-date{font-size:.82rem;color:var(--text);font-weight:500}
.row-src{font-family:var(--ff-mono);font-size:.65rem;color:var(--muted);
  letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

.row-stat{text-align:center;flex-shrink:0}
.rs-v{font-family:var(--ff-display);font-size:1.3rem;color:var(--text);line-height:1}
.rs-l{font-family:var(--ff-mono);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}

.row-dur{font-family:var(--ff-mono);font-size:.78rem;color:var(--muted);
  background:var(--surface);padding:4px 10px;border-radius:5px;
  border:1px solid var(--border);flex-shrink:0}

.row-del{width:32px;height:32px;border-radius:6px;background:transparent;
  border:1px solid transparent;color:var(--muted2);cursor:pointer;
  font-size:.9rem;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.row-del:hover{border-color:rgba(255,70,70,.3);color:var(--red);background:rgba(255,70,70,.06)}

.corrections-badge{
  font-family:var(--ff-mono);font-size:.6rem;letter-spacing:.06em;
  padding:2px 7px;border-radius:4px;border:1px solid;flex-shrink:0;
}
.corrections-badge.none{color:var(--accent);border-color:rgba(0,229,160,.25);background:rgba(0,229,160,.06)}
.corrections-badge.some{color:var(--orange);border-color:rgba(255,140,66,.25);background:rgba(255,140,66,.06)}

/* Detail drawer */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(7,9,14,.6);backdrop-filter:blur(4px);
  z-index:200;display:none;
}
.drawer-overlay.open{display:block}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;
  background:var(--card);border-left:1px solid var(--border2);
  z-index:300;overflow-y:auto;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.drawer.open{transform:translateX(0)}

.drawer-head{padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.dh-title{font-family:var(--ff-display);font-size:1.6rem;color:var(--text);letter-spacing:.04em}
.dh-close{width:32px;height:32px;background:var(--surface);border:1px solid var(--border2);
  border-radius:6px;cursor:pointer;font-size:1.1rem;color:var(--muted);
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.dh-close:hover{color:var(--text);border-color:var(--border)}

.drawer-body{padding:20px 24px;display:flex;flex-direction:column;gap:20px}

.d-section{}
.d-sec-title{font-family:var(--ff-mono);font-size:.62rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.d-sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

.d-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.d-stat{background:var(--surface);border-radius:7px;padding:12px 10px;text-align:center;border:1px solid var(--border)}
.d-sv{font-family:var(--ff-display);font-size:1.6rem;color:var(--text);line-height:1}
.d-sl{font-family:var(--ff-mono);font-size:.56rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:3px}

.d-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.d-info-row{display:flex;flex-direction:column;gap:2px;padding:10px 12px;
  background:var(--surface);border-radius:7px;border:1px solid var(--border)}
.dir-label{font-family:var(--ff-mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.dir-val{font-size:.82rem;color:var(--text);margin-top:2px}

.corrections-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.corr-item{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;
  background:var(--surface);border-radius:6px;border-left:2px solid var(--orange)}
.corr-time{font-family:var(--ff-mono);font-size:.63rem;color:var(--muted);
  flex-shrink:0;white-space:nowrap;padding-top:1px}
.corr-msg{font-size:.78rem;color:var(--text);line-height:1.4}
.no-corrections{font-size:.82rem;color:var(--accent);
  background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.15);
  padding:10px 14px;border-radius:6px;display:flex;align-items:center;gap:8px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted)}
.mini-spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div>
    <span class="nav-logo">SmartAssist</span>
    <span style="font-family:var(--ff-mono);font-size:.55rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-left:8px">by Bilal Baig</span>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">Setup</a>
    <a href="/session" class="nav-link">Session</a>
    <a href="/logs" class="nav-link active">History</a>
  </div>
</nav>

<!-- Page header -->
<div class="page-head">
  <div class="ph-left">
    <h1>WORKOUT HISTORY</h1>
    <p>All your sessions in one place — click any row to see the full breakdown</p>
  </div>
  <div class="ph-right">
    <div class="filter-tabs">
      <button class="ft on" onclick="setFilter('all')">All</button>
      <button class="ft" onclick="setFilter('squat')">Squat</button>
      <button class="ft" onclick="setFilter('plank')">Plank</button>
    </div>
    <a href="/" class="new-btn">+ New Session</a>
  </div>
</div>

<!-- Summary -->
<div class="summary-bar" id="summaryBar">
  <div class="sb-card"><div class="sb-v" id="sumTotal">—</div><div class="sb-l">Total Sessions</div></div>
  <div class="sb-card"><div class="sb-v" id="sumReps">—</div><div class="sb-l">Total Reps</div></div>
  <div class="sb-card"><div class="sb-v" id="sumHold">—</div><div class="sb-l">Best Hold</div></div>
  <div class="sb-card"><div class="sb-v" id="sumTime">—</div><div class="sb-l">Total Time</div></div>
</div>

<!-- List -->
<div class="sessions-wrap">
  <div id="logsList">
    <div class="loading"><div class="mini-spin"></div> Loading sessions…</div>
  </div>
</div>

<!-- Detail drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="dh-title" id="dTitle">Session Detail</div>
    <button class="dh-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <div class="loading"><div class="mini-spin"></div></div>
  </div>
</div>

<script>
let allSessions  = [];
let activeFilter = 'all';
let activeRow    = null;

// ── Load ───────────────────────────────────────────────────────────
async function load() {
  try {
    const data = await (await fetch('/api/logs')).json();
    allSessions = data;
    renderSummary(data);
    renderList(data);
  } catch(e) {
    document.getElementById('logsList').innerHTML =
      '<div class="empty-state"><span class="empty-icon">⚠️</span><h3>LOAD ERROR</h3><p>Could not fetch session logs.</p></div>';
  }
}

// ── Summary ─────────────────────────────────────────────────────────
function renderSummary(data) {
  const totalReps  = data.reduce((s,d)=>s+(d.reps||0), 0);
  const bestHold   = Math.max(0, ...data.map(d=>d.max_hold_sec||0));
  const totalSecs  = data.reduce((s,d)=>s+(d.duration_sec||0), 0);
  document.getElementById('sumTotal').textContent = data.length;
  document.getElementById('sumReps').textContent  = totalReps;
  document.getElementById('sumHold').textContent  = bestHold > 0 ? bestHold+'s' : '—';
  document.getElementById('sumTime').textContent  = fmtDur(totalSecs);
}

// ── Render list ──────────────────────────────────────────────────────
function renderList(data) {
  const filtered = activeFilter==='all' ? data : data.filter(d=>d.exercise===activeFilter);
  const wrap = document.getElementById('logsList');

  if(!filtered.length){
    wrap.innerHTML = `<div class="empty-state">
      <span class="empty-icon">📋</span>
      <h3>NO SESSIONS YET</h3>
      <p>${activeFilter==='all' ? 'Start a workout to see your history here.' : 'No '+activeFilter+' sessions found.'}</p>
      <a href="/" class="new-btn" style="margin-top:8px;display:inline-block">Start Session</a>
    </div>`;
    return;
  }

  wrap.innerHTML = filtered.map(s => {
    const hasCorrn = (s.errors_total||0) > 0;
    const corrBadge = hasCorrn
      ? `<span class="corrections-badge some">${s.errors_total} corrections</span>`
      : `<span class="corrections-badge none">Clean</span>`;
    const mainStat = s.exercise==='squat'
      ? `<div class="row-stat"><div class="rs-v">${s.reps||0}</div><div class="rs-l">Reps</div></div>`
      : `<div class="row-stat"><div class="rs-v">${s.max_hold_sec||0}s</div><div class="rs-l">Best Hold</div></div>`;
    const srcLabel = s.source==='webcam' ? '📷 Webcam' : '🎬 '+((s.source_name||'Video').slice(0,20));
    return `<div class="session-row" id="row_${s.session_id}" onclick="openDetail('${s.session_id}')">
      <div class="row-ex ${s.exercise}">${s.exercise.toUpperCase()}</div>
      <div class="row-meta">
        <div class="row-date">${s.date} &nbsp;·&nbsp; ${s.start_time||''}</div>
        <div class="row-src">${srcLabel}</div>
      </div>
      ${mainStat}
      ${corrBadge}
      <div class="row-dur">${fmtDur(s.duration_sec||0)}</div>
      <button class="row-del" title="Delete" onclick="delSession(event,'${s.session_id}')">🗑</button>
    </div>`;
  }).join('');
}

// ── Filter ───────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.ft').forEach((b,i)=>{
    b.className = 'ft' + (['all','squat','plank'][i]===f?' on':'');
  });
  renderList(allSessions);
}

// ── Detail drawer ────────────────────────────────────────────────────
async function openDetail(sid) {
  if(activeRow) document.getElementById('row_'+activeRow)?.classList.remove('active-row');
  activeRow = sid;
  document.getElementById('row_'+sid)?.classList.add('active-row');
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerBody').innerHTML =
    '<div class="loading"><div class="mini-spin"></div></div>';

  try {
    const d = await (await fetch('/api/logs/'+sid)).json();
    renderDrawer(d);
  } catch(e){
    document.getElementById('drawerBody').innerHTML = '<p style="color:var(--muted);padding:20px">Failed to load.</p>';
  }
}

function renderDrawer(d) {
  document.getElementById('dTitle').textContent =
    d.exercise.toUpperCase() + ' · ' + d.date;

  const mainStatLabel = d.exercise==='squat' ? 'Reps' : 'Best Hold';
  const mainStatVal   = d.exercise==='squat' ? (d.reps||0) : ((d.max_hold_sec||0)+'s');

  const corrections = (d.corrections||[]).map(c=>
    `<div class="corr-item">
      <span class="corr-time">${fmtSec(c.time_sec)}</span>
      <span class="corr-msg">${c.message}</span>
    </div>`
  ).join('') || `<div class="no-corrections">✅ No form corrections needed!</div>`;

  const snaps = d.snapshots || [];
  let chartHtml = '';
  if(snaps.length > 1){
    const maxT = snaps[snaps.length-1].t || 1;
    const allAngles = snaps.map(s=>s.knee_angle||s.body_angle).filter(Boolean);
    const minA = Math.min(...allAngles), maxA = Math.max(...allAngles), rangeA = maxA-minA||1;
    const pts  = snaps.map(s=>{
      const x  = (s.t/maxT)*240;
      const a  = s.knee_angle||s.body_angle||0;
      const y  = 60 - ((a-minA)/rangeA)*50;
      return `${x},${y}`;
    }).join(' ');
    chartHtml = `<div class="d-section">
      <div class="d-sec-title">Angle Over Time</div>
      <svg width="100%" viewBox="0 0 248 72" style="border-radius:6px;background:var(--surface);overflow:visible">
        <polyline fill="none" stroke="var(--accent)" stroke-width="1.5" points="${pts}" opacity=".8"/>
        ${snaps.map(s=>{
          const x=(s.t/maxT)*240+4; const a=s.knee_angle||s.body_angle||0;
          const y=64-((a-minA)/rangeA)*50;
          return `<circle cx="${x}" cy="${y}" r="2" fill="var(--accent)" opacity=".6"/>`;
        }).join('')}
        <line x1="4" y1="4" x2="4" y2="68" stroke="var(--border2)" stroke-width="1"/>
        <line x1="4" y1="68" x2="248" y2="68" stroke="var(--border2)" stroke-width="1"/>
        <text x="4" y="80" font-family="DM Mono,monospace" font-size="7" fill="#4a5a72">0s</text>
        <text x="220" y="80" font-family="DM Mono,monospace" font-size="7" fill="#4a5a72">${Math.round(maxT)}s</text>
      </svg>
    </div>`;
  }

  document.getElementById('drawerBody').innerHTML = `
    <div class="d-section">
      <div class="d-sec-title">Overview</div>
      <div class="d-stats-grid">
        <div class="d-stat"><div class="d-sv">${mainStatVal}</div><div class="d-sl">${mainStatLabel}</div></div>
        <div class="d-stat"><div class="d-sv">${fmtDur(d.duration_sec||0)}</div><div class="d-sl">Duration</div></div>
        <div class="d-stat"><div class="d-sv">${d.errors_total||0}</div><div class="d-sl">Corrections</div></div>
      </div>
    </div>
    <div class="d-section">
      <div class="d-sec-title">Details</div>
      <div class="d-info-grid">
        <div class="d-info-row"><span class="dir-label">Date</span><span class="dir-val">${d.date}</span></div>
        <div class="d-info-row"><span class="dir-label">Time</span><span class="dir-val">${d.start_time||'—'} → ${d.end_time||'—'}</span></div>
        <div class="d-info-row"><span class="dir-label">Source</span><span class="dir-val">${d.source==='webcam'?'📷 Webcam':'🎬 '+d.source_name}</span></div>
        <div class="d-info-row"><span class="dir-label">Exercise</span><span class="dir-val" style="text-transform:capitalize">${d.exercise}</span></div>
      </div>
    </div>
    ${chartHtml}
    <div class="d-section">
      <div class="d-sec-title">Form Corrections (${d.corrections?.length||0})</div>
      <div class="corrections-list">${corrections}</div>
    </div>`;
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  if(activeRow) document.getElementById('row_'+activeRow)?.classList.remove('active-row');
  activeRow = null;
}

// ── Delete ────────────────────────────────────────────────────────────
async function delSession(e, sid) {
  e.stopPropagation();
  if(!confirm('Delete this session log?')) return;
  await fetch('/api/logs/'+sid, {method:'DELETE'});
  allSessions = allSessions.filter(s=>s.session_id!==sid);
  renderSummary(allSessions);
  renderList(allSessions);
  if(activeRow===sid) closeDrawer();
}

// ── Helpers ───────────────────────────────────────────────────────────
function fmtDur(sec){
  if(!sec) return '0s';
  const m=Math.floor(sec/60), s=Math.round(sec%60);
  return m>0 ? m+'m '+s+'s' : s+'s';
}
function fmtSec(s){
  const m=Math.floor(s/60), r=Math.round(s%60);
  return m>0 ? m+'m'+r+'s' : r+'s';
}

load();
</script>

<footer style="text-align:center;padding:32px 0 40px;font-family:var(--ff-mono);font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted2)">
  SmartAssist &nbsp;·&nbsp; AI Exercise Coach &nbsp;·&nbsp; Built by Bilal Baig
</footer>

</body>
</html>
